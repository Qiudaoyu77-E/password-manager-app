<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地密码管理工具</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b7769'/%3E%3Cpath d='M21 29h22v19H21z' fill='white'/%3E%3Cpath d='M25 29v-7a7 7 0 0 1 14 0v7' fill='none' stroke='white' stroke-width='5'/%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="lockedView" class="auth-layout">
        <div class="brand-panel">
          <p class="eyebrow">Local Vault</p>
          <h1>密码管理工具</h1>
          <p class="intro">本地加密保存账号和密码，离线可用，点击即可复制。</p>
          <div class="status-strip">
            <span>浏览器本地存储</span>
            <span>AES-GCM 加密</span>
            <span>不上传数据</span>
          </div>
        </div>

        <form id="unlockForm" class="auth-panel">
          <h2 id="authTitle">解锁金库</h2>
          <p id="authHint" class="muted">输入主密码后进入你的本地金库。</p>
          <input type="text" autocomplete="username" value="local-vault" class="hidden" tabindex="-1" aria-hidden="true" />
          <label>
            主密码
            <input id="masterPassword" type="password" autocomplete="current-password" required minlength="6" />
          </label>
          <button type="submit" class="primary-btn">进入</button>
          <button type="button" id="resetVaultBtn" class="text-btn danger hidden">清空并重新创建金库</button>
          <p id="authMessage" class="message" role="status"></p>
        </form>
      </section>

      <section id="vaultView" class="vault-layout hidden">
        <aside class="sidebar">
          <div>
            <p class="eyebrow">Vault</p>
            <h1>密码库</h1>
          </div>
          <button id="addEntryBtn" class="primary-btn">添加条目</button>
          <button id="generateBtn" class="secondary-btn">生成密码</button>
          <button id="syncSettingsBtn" class="secondary-btn">同步设置</button>
          <button id="syncPullBtn" class="secondary-btn">从云端同步</button>
          <button id="syncPushBtn" class="secondary-btn">同步到云端</button>
          <button id="exportBtn" class="secondary-btn">导出备份</button>
          <label class="file-btn">
            导入备份
            <input id="importInput" type="file" accept="application/json,.json" />
          </label>
          <button id="lockBtn" class="text-btn">锁定</button>
        </aside>

        <section class="content">
          <div class="topbar">
            <label class="search-box">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="网站、账号、标签" autocomplete="off" />
            </label>
            <div class="vault-stats">
            <strong id="entryCount">0</strong>
            <span>条记录</span>
          </div>
        </div>
          <p class="lock-note">超过 3 分钟未操作会自动锁定。</p>

          <div id="entryList" class="entry-grid" aria-live="polite"></div>
          <div id="emptyState" class="empty-state hidden">
            <h2>还没有保存密码</h2>
            <p>添加你的第一个网站、账号和密码，之后就能一键复制。</p>
            <button id="emptyAddBtn" class="primary-btn">添加条目</button>
          </div>
        </section>
      </section>
    </main>

    <dialog id="entryDialog">
      <form id="entryForm" method="dialog" class="dialog-body">
        <div class="dialog-header">
          <h2 id="dialogTitle">添加条目</h2>
          <button type="button" id="closeDialogBtn" class="icon-btn" aria-label="关闭">×</button>
        </div>
        <input id="entryId" type="hidden" />
        <label>
          名称
          <input id="entryName" type="text" required placeholder="例如 Gmail" />
        </label>
        <label>
          登录地址
          <input id="entryUrl" type="url" placeholder="https://example.com" />
        </label>
        <label>
          账号
          <input id="entryUsername" type="text" required autocomplete="off" />
        </label>
        <label>
          密码
          <div class="inline-input">
            <input id="entryPassword" type="password" required autocomplete="new-password" />
            <button id="togglePasswordBtn" type="button" class="small-btn">显示</button>
          </div>
        </label>
        <label>
          标签
          <input id="entryTags" type="text" placeholder="工作, 银行, 个人" />
        </label>
        <label>
          备注
          <textarea id="entryNotes" rows="3" placeholder="可选"></textarea>
        </label>
        <div class="dialog-actions">
          <button id="deleteEntryBtn" type="button" class="text-btn danger hidden">删除</button>
          <button type="submit" class="primary-btn">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="generatorDialog">
      <form method="dialog" class="dialog-body">
        <div class="dialog-header">
          <h2>生成密码</h2>
          <button type="button" id="closeGeneratorBtn" class="icon-btn" aria-label="关闭">×</button>
        </div>
        <label>
          长度
          <input id="passwordLength" type="range" min="12" max="32" value="18" />
        </label>
        <output id="lengthOutput">18 位</output>
        <div class="generated-row">
          <input id="generatedPassword" type="text" readonly />
          <button id="copyGeneratedBtn" type="button" class="small-btn">复制</button>
        </div>
        <button id="refreshPasswordBtn" type="button" class="secondary-btn">重新生成</button>
      </form>
    </dialog>

    <dialog id="syncDialog">
      <form id="syncForm" method="dialog" class="dialog-body">
        <div class="dialog-header">
          <h2>同步设置</h2>
          <button type="button" id="closeSyncBtn" class="icon-btn" aria-label="关闭">×</button>
        </div>
        <p class="muted">使用 GitHub 私密 Gist 保存加密金库。云端只保存密文，但 token 会保存在本机浏览器里。</p>
        <label>
          GitHub Token
          <input id="syncToken" type="password" autocomplete="off" placeholder="需要 gist 权限" />
        </label>
        <label>
          Gist ID
          <input id="syncGistId" type="text" autocomplete="off" placeholder="留空时会自动创建私密 Gist" />
        </label>
        <label>
          文件名
          <input id="syncFilename" type="text" value="password-vault.json" />
        </label>
        <label class="check-row">
          <input id="syncAuto" type="checkbox" />
          <span>保存密码后自动同步到云端</span>
        </label>
        <div id="syncStatus" class="sync-status muted"></div>
        <div class="dialog-actions">
          <button id="clearSyncBtn" type="button" class="text-btn danger">清除同步设置</button>
          <button type="submit" class="primary-btn">保存设置</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast hidden" role="status"></div>
    <script src="./app.js"></script>
  </body>
</html>
